name: Validate FASTA Files

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "scripts/*.py"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run validate and format script
        run: |
          # Use uv run to execute the script. 
          # uv will automatically handle the metadata dependencies.
          for file in contaminants_*.fasta; do
            [ -e "$file" ] || continue
            echo "Processing $file..."
            uv run scripts/validate_and_format_fasta.py "$file"
          done

      - name: Check for file changes
        run: |
          git add -A
          if ! git diff --cached --exit-code; then
            echo "::error::FASTA formatting violation: Please run 'scripts/validate_and_format_fasta.py' locally and commit the suggested changes."
            git diff --cached --color
            exit 1
          fi
          echo "All files valid and properly formatted"